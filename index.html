<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prédio AR GPS</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    font-family:Arial;
}
</style>

</head>

<body>

<div id="info">
Aguardando GPS...
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-assets>
        <a-asset-item
            id="predio"
            src="predio.glb">
        </a-asset-item>
    </a-assets>

   <a-entity
    id="predioGPS"
    gltf-model="#predio"
    gps-new-entity-place="
        latitude: -5.494951;
        longitude: -47.478713;
    "
    scale="0.1 0.1 0.1"
    position="0 -10 0">
</a-entity>

    <a-camera gps-new-camera></a-camera>

</a-scene>

<script>

navigator.geolocation.watchPosition(

function(pos){

document.getElementById("info").innerHTML =
"GPS OK<br>" +
"Lat: " + pos.coords.latitude.toFixed(6) + "<br>" +
"Lon: " + pos.coords.longitude.toFixed(6) + "<br>" +
"Precisão: " + Math.round(pos.coords.accuracy) + " m";

},

function(err){

document.getElementById("info").innerHTML =
"Erro GPS: " + err.message;

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

</script>

</body>
</html>
