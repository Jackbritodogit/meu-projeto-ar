<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prédio AR GPS</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
}

.info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 999;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    border-radius: 8px;
    font-family: Arial;
}
</style>
</head>

<body>

<div class="info">
    Caminhe até o terreno e permita o acesso ao GPS e à câmera.
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam;
          videoTexture: true;
          debugUIEnabled: false">

    <a-assets>
        <a-asset-item
            id="predio"
            src="predio.glb">
        </a-asset-item>
    </a-assets>

    <!-- MODELO 3D -->

    <a-entity
        gltf-model="#predio"

        gps-new-entity-place="
            latitude: -5.494951;
            longitude: -47.478713;
        "

        scale="100 100 100"
        rotation="0 0 0">
    </a-entity>

    <!-- CÂMERA -->

    <a-camera
        gps-new-camera="gpsMinDistance: 5">
    </a-camera>

</a-scene>

</body>
</html>
