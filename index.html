<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prédio AR GPS</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', sans-serif; }

#info {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 9999;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 200px;
}

#info .label { color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
#info .value { color: #4fc; font-weight: 600; }

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    gap: 10px;
}

.btn {
    background: rgba(0,0,0,0.75);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
}
.btn:active { background: rgba(80,200,120,0.4); }

#status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f44;
    margin-right: 6px;
    vertical-align: middle;
}
#status-dot.ok { background: #4fc; box-shadow: 0 0 6px #4fc; }
</style>
</head>

<body>

<div id="info">
    <span id="status-dot"></span><span id="status-text">Aguardando GPS...</span><br><br>
    <span class="label">Latitude</span><br>
    <span class="value" id="lat">—</span><br>
    <span class="label">Longitude</span><br>
    <span class="value" id="lon">—</span><br>
    <span class="label">Precisão</span><br>
    <span class="value" id="acc">—</span><br>
    <span class="label">Distância ao prédio</span><br>
    <span class="value" id="dist">—</span>
</div>

<div id="controls">
    <button class="btn" onclick="ajustarEscala(0.5)">− Escala</button>
    <button class="btn" onclick="ajustarEscala(2)">+ Escala</button>
    <button class="btn" onclick="ajustarAltura(-1)">↓ Altura</button>
    <button class="btn" onclick="ajustarAltura(1)">↑ Altura</button>
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <a-assets timeout="30000">
        <!-- 
            IMPORTANTE: Troque a URL abaixo pela URL "raw" do seu arquivo no GitHub.
            Exemplo:
            https://raw.githubusercontent.com/Jackbritodogit/meu-projeto-ar/main/predio.glb
        -->
        <a-asset-item
            id="predio"
            src="https://raw.githubusercontent.com/Jackbritodogit/meu-projeto-ar/main/predio.glb">
        </a-asset-item>
    </a-assets>

    <!--
        AJUSTES PRINCIPAIS:
        - scale: comece com "1 1 1" e use os botões para ajustar
        - position Y: altura do modelo (0 = no chão, positivo = sobe)
        - rotation: "-90 0 0" corrige modelos exportados deitados do SketchUp
        - gps-new-entity-place: suas coordenadas GPS do prédio
    -->
    <a-entity
        id="predioGPS"
        gltf-model="#predio"
        gps-new-entity-place="latitude: -5.494951; longitude: -47.478713;"
        scale="1 1 1"
        position="0 0 0"
        rotation="-90 0 0"
        animation__load="property: scale; from: 0 0 0; to: 1 1 1; dur: 600; easing: easeOutBack; startEvents: model-loaded">
    </a-entity>

    <!--
        gps-new-camera: 
        - simulateAltitude: coloca câmera 1.6m do chão (altura dos olhos)
        - positionMinAccuracy: aceita GPS com até 100m de precisão
        - minDistance: mostra objetos a partir de 1m de distância
    -->
    <a-camera
        gps-new-camera="simulateAltitude: 1.6; positionMinAccuracy: 100; minDistance: 1"
        far="100000"
        near="0.01">
    </a-camera>

</a-scene>

<script>

// ─── Coordenadas do prédio (para calcular distância) ───────────────────
const PREDIO_LAT = -5.494951;
const PREDIO_LON = -47.478713;

// ─── Controles de escala e altura em tempo real ────────────────────────
let escalaAtual = 1;
let alturaAtual = 0;

function ajustarEscala(fator) {
    escalaAtual *= fator;
    escalaAtual = Math.max(0.01, Math.min(1000, escalaAtual));
    const el = document.getElementById('predioGPS');
    el.setAttribute('scale', `${escalaAtual} ${escalaAtual} ${escalaAtual}`);
}

function ajustarAltura(delta) {
    alturaAtual += delta;
    const el = document.getElementById('predioGPS');
    el.setAttribute('position', `0 ${alturaAtual} 0`);
}

// ─── Cálculo de distância Haversine ───────────────────────────────────
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── GPS ───────────────────────────────────────────────────────────────
navigator.geolocation.watchPosition(
    function(pos) {
        const { latitude, longitude, accuracy } = pos.coords;

        document.getElementById('status-dot').className = 'ok';
        document.getElementById('status-text').textContent = 'GPS ativo';
        document.getElementById('lat').textContent = latitude.toFixed(6) + '°';
        document.getElementById('lon').textContent = longitude.toFixed(6) + '°';
        document.getElementById('acc').textContent = Math.round(accuracy) + ' m';

        const dist = calcularDistancia(latitude, longitude, PREDIO_LAT, PREDIO_LON);
        document.getElementById('dist').textContent =
            dist < 1000
                ? Math.round(dist) + ' m'
                : (dist / 1000).toFixed(2) + ' km';
    },
    function(err) {
        document.getElementById('status-text').textContent = 'Erro GPS: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
);

// ─── Log quando o modelo carregar ─────────────────────────────────────
document.querySelector('#predioGPS').addEventListener('model-loaded', () => {
    console.log('✅ Modelo GLB carregado com sucesso!');
    document.getElementById('status-text').textContent = 'Modelo carregado ✓';
});

document.querySelector('#predioGPS').addEventListener('model-error', (e) => {
    console.error('❌ Erro ao carregar modelo:', e);
    document.getElementById('status-text').textContent = '⚠ Erro ao carregar GLB';
});

</script>
</body>
</html>
