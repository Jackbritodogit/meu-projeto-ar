<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste A-Frame</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{
    margin:0;
}
</style>

</head>

<body>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-assets>
        <a-asset-item id="predio" src="predio.glb"></a-asset-item>
    </a-assets>

    <a-entity
        gltf-model="#predio"
        position="0 0 -10"
        scale="1 1 1">
    </a-entity>

    <a-camera></a-camera>

</a-scene>

</body>
</html>
