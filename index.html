<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste A-Frame</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{
    margin:0;
}
</style>

</head>

<body>

<a-scene>

    <!-- Caixa gigante -->

    <a-box
        position="0 0 -10"
        width="5"
        height="10"
        depth="5"
        color="red">
    </a-box>

    <!-- Chão -->

    <a-plane
        position="0 -5 -10"
        rotation="-90 0 0"
        width="50"
        height="50"
        color="#7BC8A4">
    </a-plane>

    <!-- Luz -->

    <a-light
        type="ambient"
        intensity="1">
    </a-light>

    <!-- Câmera -->

    <a-camera
        position="0 0 0">
    </a-camera>

</a-scene>

</body>
</html>
