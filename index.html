<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prédio AR - Marcador</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', sans-serif; }

#ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    pointer-events: none;
}

#topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
}

#status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    font-size: 13px;
}

#dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #f55;
    box-shadow: 0 0 6px #f55;
    animation: pulse 1.5s infinite;
}
#dot.found {
    background: #4fc;
    box-shadow: 0 0 10px #4fc;
    animation: none;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

#hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    white-space: nowrap;
    transition: opacity 0.5s;
    pointer-events: none;
}
#hint.hidden { opacity: 0; }

#controls {
    position: fixed;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.btn {
    background: rgba(0,0,0,0.7);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    width: 46px; height: 46px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-tap-highlight-color: transparent;
}
.btn:active { background: rgba(80,200,120,0.5); }

.btn-label {
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-top: -4px;
}
</style>
</head>
<body>

<div id="ui">
    <div id="topbar">
        <div id="status">
            <div id="dot"></div>
            <span id="status-text">Procurando marcador...</span>
        </div>
    </div>
</div>

<div id="hint">📄 Aponte a câmera para o marcador impresso</div>

<div id="controls">
    <div>
        <button class="btn" onclick="ajustar('escala', 1.2)">＋</button>
        <div class="btn-label">Escala</div>
    </div>
    <div>
        <button class="btn" onclick="ajustar('escala', 0.8)">－</button>
        <div class="btn-label">Escala</div>
    </div>
    <div style="height:10px"></div>
    <div>
        <button class="btn" onclick="ajustar('altura', 1)">↑</button>
        <div class="btn-label">Altura</div>
    </div>
    <div>
        <button class="btn" onclick="ajustar('altura', -1)">↓</button>
        <div class="btn-label">Altura</div>
    </div>
    <div style="height:10px"></div>
    <div>
        <button class="btn" onclick="ajustar('rot', 15)">↻</button>
        <div class="btn-label">Girar</div>
    </div>
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <a-assets timeout="30000">
        <a-asset-item id="predio" src="./predio.glb"></a-asset-item>
    </a-assets>

    <!-- Marcador HIRO — padrão do AR.js, muito robusto -->
    <a-marker
        id="marker"
        preset="hiro"
        raycaster="objects: .clickable"
        emitevents="true"
        cursor="fuse: false; rayOrigin: mouse;">

        <a-entity
            id="predioAR"
            gltf-model="#predio"
            scale="0.01 0.01 0.01"
            position="0 0 0"
            rotation="-90 0 0">
        </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>
let escala = 0.01;
let altura = 0;
let rotacao = -90;

function ajustar(tipo, val) {
    const el = document.getElementById('predioAR');
    if (tipo === 'escala') {
        escala = Math.max(0.0001, Math.min(100, escala * val));
        el.setAttribute('scale', `${escala} ${escala} ${escala}`);
    } else if (tipo === 'altura') {
        altura += val * escala * 50;
        el.setAttribute('position', `0 ${altura} 0`);
    } else if (tipo === 'rot') {
        rotacao += val;
        el.setAttribute('rotation', `${rotacao} 0 0`);
    }
}

// Detectar marcador
const marker = document.getElementById('marker');

marker.addEventListener('markerFound', () => {
    document.getElementById('dot').className = 'found';
    document.getElementById('status-text').textContent = 'Marcador detectado ✓';
    document.getElementById('hint').classList.add('hidden');
});

marker.addEventListener('markerLost', () => {
    document.getElementById('dot').className = '';
    document.getElementById('status-text').textContent = 'Procurando marcador...';
    document.getElementById('hint').classList.remove('hidden');
});

// Log de carregamento
document.getElementById('predioAR').addEventListener('model-loaded', () => {
    document.getElementById('status-text').textContent = 'Modelo carregado ✓';
});

document.getElementById('predioAR').addEventListener('model-error', () => {
    document.getElementById('status-text').textContent = '⚠ Erro ao carregar GLB';
});
</script>
</body>
</html>
