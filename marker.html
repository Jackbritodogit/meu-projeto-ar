<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcador Hiro – AR Prédio 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.02em;
      text-align: center;
    }

    .badge {
      background: #00c985;
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .marker-wrapper {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 360px;
      width: 100%;
    }

    .marker-wrapper img {
      width: 100%;
      max-width: 280px;
      image-rendering: pixelated;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    .label {
      font-size: .82rem;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }

    .label strong { color: #1a1a2e; }

    .btn-print {
      padding: 14px 36px;
      background: #1a1a2e;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform .15s, background .15s;
    }

    .btn-print:hover { background: #2c2c50; }
    .btn-print:active { transform: scale(.97); }

    .back {
      font-size: .82rem;
      color: #999;
      text-decoration: none;
    }

    .back:hover { color: #00c985; }

    .tip {
      max-width: 360px;
      background: #fffbe6;
      border: 1px solid #f0d060;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .82rem;
      color: #7a6010;
      line-height: 1.55;
      text-align: center;
    }

    @media print {
      body { background: white; padding: 0; }
      .btn-print, .back, .badge, h1, .tip { display: none; }
      .marker-wrapper { border: none; box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>

  <span class="badge">Marcador AR</span>
  <h1>Marcador Hiro<br>para Realidade Aumentada</h1>

  <div class="marker-wrapper">
    <!-- Marcador Hiro oficial do AR.js -->
    <img
      src="https://raw.githack.com/jeromeetienne/AR.js/master/data/images/HIRO.jpg"
      alt="Marcador Hiro"
    />
    <p class="label">
      <strong>Imprima este marcador</strong><br>
      Coloque-o numa superfície plana e aponte a câmera para ele.
    </p>
  </div>

  <div class="tip">
    💡 <strong>Dica:</strong> Imprima em papel branco, tamanho A4. Quanto maior o marcador, mais fácil a detecção. Boa iluminação ajuda bastante!
  </div>

  <button class="btn-print" onclick="window.print()">🖨️ Imprimir Marcador</button>

  <a href="index.html" class="back">← Voltar para o Visualizador AR</a>

</body>
</html>
