<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code – AR Prédio 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 20px;
    }

    .glow-title {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -.025em;
      text-align: center;
      line-height: 1.25;
    }

    .glow-title span {
      color: #00e5a0;
      text-shadow: 0 0 20px #00e5a066;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 0 60px #00e5a022;
      max-width: 340px;
      width: 100%;
    }

    .card canvas,
    .card img { border-radius: 8px; }

    .url-label {
      font-size: .75rem;
      color: #aaa;
      word-break: break-all;
      text-align: center;
      letter-spacing: .02em;
    }

    .url-label strong { color: #1a1a2e; }

    .subtitle {
      font-size: .9rem;
      color: #a0b8b0;
      text-align: center;
      max-width: 300px;
      line-height: 1.55;
    }

    .subtitle strong { color: #00e5a0; }

    .steps-mini {
      display: flex;
      gap: 10px;
      max-width: 340px;
      width: 100%;
    }

    .s {
      flex: 1;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      font-size: .74rem;
      color: #c0c8d8;
      line-height: 1.45;
    }

    .s .icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }

    .btn-print {
      padding: 14px 36px;
      background: #00e5a0;
      color: #0a0a0f;
      font-size: .95rem;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 24px #00e5a044;
      transition: transform .15s;
    }

    .btn-print:active { transform: scale(.96); }

    @media print {
      body {
        background: white;
        color: black;
        padding: 0;
        gap: 0;
      }
      .btn-print, .steps-mini, .glow-title + p { display: none; }
      .card { box-shadow: none; border: 1px solid #ddd; }
      .subtitle { display: none; }
    }
  </style>
</head>
<body>

  <p class="glow-title">QR Code<br><span>AR · Prédio 3D</span></p>

  <p class="subtitle">
    Escaneie com o celular para abrir o<br>
    <strong>Visualizador de Realidade Aumentada</strong>
  </p>

  <div class="card">
    <canvas id="qrCanvas"></canvas>
    <p class="url-label">
      <strong>jackbritodogit.github.io/meu-projeto-ar</strong>
    </p>
  </div>

  <div class="steps-mini">
    <div class="s"><span class="icon">📱</span>Escaneie o QR Code</div>
    <div class="s"><span class="icon">🖨️</span>Imprima o marcador Hiro</div>
    <div class="s"><span class="icon">🏛️</span>Veja o prédio em 3D!</div>
  </div>

  <button class="btn-print" onclick="window.print()">🖨️ Imprimir QR Code</button>

  <!-- QRCode.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    QRCode.toCanvas(
      document.getElementById('qrCanvas'),
      'https://jackbritodogit.github.io/meu-projeto-ar/',
      {
        width: 260,
        margin: 2,
        color: { dark: '#000000', light: '#ffffff' },
        errorCorrectionLevel: 'H'
      },
      (err) => { if (err) console.error(err); }
    );
  </script>

</body>
</html>
